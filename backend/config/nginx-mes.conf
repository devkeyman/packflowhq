# MES Application Nginx Configuration
# Place this file in /etc/nginx/conf.d/mes.conf

# 업스트림 서버 정의
upstream mes_backend {
    server localhost:8080 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP 서버 블록 (80 포트)
server {
    listen 80;
    listen [::]:80;
    server_name _;  # 도메인이 있으면 여기에 입력 (예: mes.example.com)
    
    # 로그 파일 설정
    access_log /var/log/nginx/mes_access.log combined;
    error_log /var/log/nginx/mes_error.log warn;
    
    # 최대 업로드 파일 크기
    client_max_body_size 100M;
    
    # 버퍼 크기 설정
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;
    
    # 타임아웃 설정
    client_body_timeout 60;
    client_header_timeout 60;
    keepalive_timeout 65;
    send_timeout 60;
    
    # Gzip 압축 설정
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml image/svg+xml
               text/x-js text/x-cross-domain-policy application/x-font-ttf
               application/x-font-opentype application/vnd.ms-fontobject
               image/x-icon;
    gzip_disable "MSIE [1-6]\.";
    
    # 보안 헤더 설정
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # 루트 경로 - Spring Boot 애플리케이션으로 프록시
    location / {
        proxy_pass http://mes_backend;
        proxy_http_version 1.1;
        
        # 프록시 헤더 설정
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # 연결 설정
        proxy_set_header Connection "";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # 버퍼링 설정
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        
        # 캐시 우회 (동적 콘텐츠)
        proxy_cache_bypass $http_upgrade;
        
        # WebSocket 지원
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    
    # API 엔드포인트 전용 설정
    location /api/ {
        proxy_pass http://mes_backend;
        proxy_http_version 1.1;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # API 타임아웃 설정 (더 긴 시간)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        
        # CORS 처리는 Spring에서 처리하도록 함
    }
    
    # 정적 리소스 캐싱
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|otf|eot)$ {
        proxy_pass http://mes_backend;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    location ~* \.(css|js)$ {
        proxy_pass http://mes_backend;
        expires 7d;
        add_header Cache-Control "public, must-revalidate";
        access_log off;
    }
    
    # 헬스체크 엔드포인트
    location /health {
        proxy_pass http://mes_backend/actuator/health;
        access_log off;
        
        # 헬스체크는 빠른 응답 필요
        proxy_connect_timeout 5s;
        proxy_send_timeout 5s;
        proxy_read_timeout 5s;
    }
    
    # Actuator 엔드포인트 (관리자만 접근 가능하도록 IP 제한 권장)
    location /actuator/ {
        # IP 제한 예시 (필요시 활성화)
        # allow 127.0.0.1;
        # allow 10.0.0.0/8;
        # deny all;
        
        proxy_pass http://mes_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    
    # 로봇 크롤러 차단 (필요시)
    location = /robots.txt {
        add_header Content-Type text/plain;
        return 200 "User-agent: *\nDisallow: /api/\nDisallow: /actuator/\n";
    }
    
    # 파비콘 처리
    location = /favicon.ico {
        proxy_pass http://mes_backend;
        expires 30d;
        access_log off;
        log_not_found off;
    }
    
    # 에러 페이지 설정
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

