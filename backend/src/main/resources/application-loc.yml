# ========================================
# 개발 환경 설정 (Development)
# ========================================

spring:
    # 데이터베이스 설정 (개발 DB)
    datasource:
        url: jdbc:mysql://localhost:3306/mes_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
        username: admin
        password: inno0000
        driver-class-name: com.mysql.cj.jdbc.Driver
        hikari:
            maximum-pool-size: 5
            minimum-idle: 2
    
    # JPA 설정 (개발 환경)
    jpa:
        hibernate:
            ddl-auto: update  # 개발 환경에서는 자동 스키마 업데이트
        show-sql: true  # SQL 쿼리 출력
        properties:
            hibernate:
                show_sql: true
                use_sql_comments: true
                highlight_sql: true
    
    # DevTools 활성화 (개발 환경에서만)
    devtools:
        restart:
            enabled: true
        livereload:
            enabled: true

# 서버 포트 (개발)
server:
    port: 8080

# 로깅 설정 (개발 - 상세 로그)
logging:
    level:
        root: INFO
        com.mes: DEBUG
        org.springframework.web: DEBUG
        org.springframework.security: DEBUG
        org.hibernate.SQL: DEBUG
        org.hibernate.type.descriptor.sql.BasicBinder: TRACE
        org.hibernate.type: TRACE
    pattern:
        console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file:
        name: logs/mes-dev.log
        max-size: 10MB
        max-history: 10

# JWT Settings (개발용 - 짧은 만료 시간)
jwt:
    secret: dev-secret-key-357638792F423F4528482B4D6251655468576D5A7134743777217A25432A462D
    expiration: 3600000  # 1 hour
    refresh-expiration: 86400000  # 24 hours

# CORS 설정 (개발 환경 - 모든 출처 허용)
cors:
    allowed-origins: "*"
    allowed-methods: "*"
    allowed-headers: "*"
    allow-credentials: true

# 모니터링 설정 (개발)
management:
    endpoints:
        web:
            exposure:
                include: "*"  # 모든 액추에이터 엔드포인트 노출
    endpoint:
        health:
            show-details: always

# 개발 환경 전용 설정
app:
    environment: development
    debug-mode: true
    mock-data: true
    api-docs-enabled: true